<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Drill 2</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
     <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    

</head>
<body>  
     <main class="container-fluid">
        <div class="container mt-4 ml-4" id="look">
            <h2 class="mb-2">Triangle Area Calculator</h2><hr>
        
            <img src="triangle.png" width="470px" height="300px"><br>

            <div class="mb-3">
                <label>Base:</label>
                <input type="number" id="baseValue"  class="form-control w-75 mx-auto">
            </div>

            <div class="mb-3">
                <label>Height:</label>
                <input type="number" id="heightValue"  class="form-control w-75 mx-auto">
            </div>

            <div class="mb-3">
                <label>Area:</label>
                <input type="number" id="areaResult"  class="form-control w-75 mx-auto" readonly>
            </div>

            <div class="text-center">
            <button type="button" class="btn btn-primary" onclick="calculate()">Calculate</button>
            <button type="button" class="btn btn-danger" onclick="window.location.reload()">Reset</button>
            </div>

        </div>
    </main>
    
    <!-- MAIN JS -->
    <script src="main.js"></script>
</body>
</html>
